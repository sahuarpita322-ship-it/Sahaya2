<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3949ab"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#0f172a" flood-opacity="0.2"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#ef4444" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Base Background with rounded corners -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <!-- Modern Shield -->
  <path d="M256 70 L110 130 C110 260 160 380 256 440 C352 380 402 260 402 130 L256 70 Z" fill="url(#shieldGrad)" filter="url(#dropShadow)"/>
  
  <!-- Inner White Base for contrast -->
  <circle cx="256" cy="256" r="100" fill="#ffffff" filter="url(#dropShadow)"/>
  
  <!-- Red Emergency Cross -->
  <path d="M236 196 h40 v40 h40 v40 h-40 v40 h-40 v-40 h-40 v-40 h40 v-40 z" fill="url(#crossGrad)" filter="url(#glow)"/>
</svg>