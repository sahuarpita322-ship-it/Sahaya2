<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF7A00" />
            <stop offset="100%" stop-color="#FF004D" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="16" stdDeviation="24" flood-opacity="0.25" />
        </filter>
    </defs>
    <!-- Rounded background for standard app icon shape -->
    <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
    <!-- Shield Base -->
    <g filter="url(#shadow)">
        <path d="M256 96 L400 136 V260 C400 360 256 432 256 432 C256 432 112 360 112 260 V136 L256 96 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="16" stroke-linejoin="round"/>
    </g>
    <!-- Inner Medical/Help Cross -->
    <rect x="236" y="196" width="40" height="120" rx="12" fill="url(#bgGrad)"/>
    <rect x="196" y="236" width="120" height="40" rx="12" fill="url(#bgGrad)"/>
</svg>