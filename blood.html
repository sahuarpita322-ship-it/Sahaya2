<!DOCTYPE html>
<html>
<head>
  <link rel="manifest" href="manifest.json">

  <title>Sahaya – Bloodbank</title>

  <meta name="description" content="Sahaya provides quick access to emergency services, hospitals, blood banks, and government schemes for rural and semi-urban users.">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body data-page="blood">
  <div class="app" role="main">
    <a href="index.html" class="btn-back">
      <span>⬅</span> Back to Home
    </a>

    <header class="app-header" style="margin-bottom:10px;">
      <div class="app-title">
        🩸 Blood Banks
        <span>Nearby centres &amp; availability</span>
      </div>
      <div class="language-buttons" role="group" aria-label="Choose language">
        <button type="button" onclick="setLanguage('en')" aria-pressed="true">English</button>
        <button type="button" onclick="setLanguage('hi')" aria-pressed="false">हिन्दी</button>
        <button type="button" onclick="setLanguage('or')" aria-pressed="false">ଓଡିଆ</button>
      </div>
    </header>

    <button id="voiceBtn" type="button" class="btn-voice">
      🔊 Listen instructions
    </button>

    <section aria-label="Filter blood group" style="margin-top:14px;">
      <div class="card">
        <p class="section-title">Search Blood Banks in India</p>
        
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
          <input type="text" id="citySearchBlood" placeholder="Enter city (e.g. Pune)" style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e0; font-family: 'Poppins', sans-serif; font-size: 14px;">
          <button onclick="searchCityBloodBanks()" style="background: #e53e3e; color: white; padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 14px;">Search</button>
        </div>

        <button onclick="findNearestBloodBanks()" style="width: 100%; background: #48bb78; color: white; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 15px; box-shadow: 0 4px 10px rgba(72, 187, 120, 0.3);">
          📍 Find Nearest Blood Banks
        </button>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-top: 10px; border-top: 1px solid #edf2f7;">
          <p class="section-title" style="margin: 0; font-size: 15px;">Filter by Blood Group</p>
          <select id="groupFilter" onchange="filterBlood()" style="padding: 8px; border-radius: 8px; border: 1px solid #cbd5e0; outline: none; font-family: 'Poppins', sans-serif;">
            <option value="all">All groups</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
          </select>
        </div>
        <div id="bloodList"></div>
      </div>
    </section>

    <script src="script.js"></script>
    <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.log("Service Worker Failed:", err));
}
    </script>
  </div>
</body>
</html>
